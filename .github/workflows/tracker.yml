name: Cập nhật dữ liệu Celeb Tracker

on:
  workflow_dispatch:
    # Kích hoạt thủ công từ GitHub UI hoặc từ cron-job.org
    # cron-job.org gọi: POST /repos/{owner}/{repo}/actions/workflows/tracker.yml/dispatches

jobs:
  track:
    name: Cập nhật dữ liệu Celeb Tracker
    runs-on: ubuntu-latest
    concurrency:
      group: tracker-bot
      cancel-in-progress: false
    permissions:
      contents: write  # Cần quyền push commit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tracker
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          L_DIO_EMAIL: ${{ secrets.L_DIO_EMAIL }}
          L_DIO_PASSWORD: ${{ secrets.L_DIO_PASSWORD }}
        run: |
          npm install
          node src/tracker.js

      - name: Commit và Push nếu có thay đổi
        if: always()
        run: |
          git config user.name "Celeb Tracker Bot"
          git config user.email "bot@Celeb-Tracker.github.io"
          git add data/celebs.json data/scan_state.json
          if git diff --staged --quiet; then
            echo "Không có thay đổi nào cần commit."
          else
            TIMESTAMP=$(TZ='Asia/Ho_Chi_Minh' date +"%Y-%m-%d %H:%M VN")
            # Đếm số celeb mới từ diff
            NEW_COUNT=$(git diff --staged data/celebs.json | grep -c '^\+.*"username"' || true)
            if [ "$NEW_COUNT" -gt "0" ]; then
              git commit -m "🎉 Phát hiện ${NEW_COUNT} celeb mới [${TIMESTAMP}]"
            else
              git commit -m "🔄 Cập nhật trạng thái quét [${TIMESTAMP}]"
            fi
            git pull --rebase
            git push
          fi
